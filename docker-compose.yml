services:
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - udd-net

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - '4000:4000'
    env_file: ./backend/.env
    environment:
      - POSTGRES_HOST=postgres
      - MINIO_ENDPOINT=minio
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - logs_data:/logs
    networks:
      - udd-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: udd
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d udd"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - udd-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - udd-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - udd-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    volumes:
      - ./elk/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - logs_data:/logs:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - udd-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - udd-net

  kibana-setup:
    image: python:3.11-alpine
    volumes:
      - ./elk/kibana/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    environment:
      - KIBANA_URL=http://kibana:5601
    depends_on:
      kibana:
        condition: service_healthy
    networks:
      - udd-net
    restart: "no"

volumes:
  postgres_data:
  minio_data:
  es_data:
  logs_data:

networks:
  udd-net:
    driver: bridge
