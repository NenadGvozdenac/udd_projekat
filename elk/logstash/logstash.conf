input {
  file {
    path => "/logs/app.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  # Winston writes JSON — codec already parses it.
  # Fix @timestamp from Winston's "timestamp" field.
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Rename "event" (reserved ECS object field) to "event_type"
  # and remove Logstash-added noise fields
  mutate {
    rename => { "event" => "event_type" }
    remove_field => ["host", "path", "@version"]
  }

  # Tag document_indexed events for audit dashboard
  if [event_type] == "document_indexed" {
    mutate { add_tag => ["audit"] }
  }

  # Drop debug-level logs
  if [level] == "debug" {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "udd-logs-%{+YYYY.MM.dd}"
  }
}
